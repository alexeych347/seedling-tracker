<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Мой подоконник — Трекер рассады</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Cloud drift keyframe must live here so it's always available */
    @keyframes drift {
      from { transform: translateX(-160px); }
      to   { transform: translateX(110vw);  }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MAIN VIEW — Windowsill scene
════════════════════════════════════════════════════════════════════════════ -->
<div id="mainView" class="view main-view active">

  <!-- Window frame bars -->
  <div class="window-frame" aria-hidden="true">
    <div class="frame-edge top"></div>
    <div class="frame-edge left"></div>
    <div class="frame-edge right"></div>
    <div class="frame-edge bottom"></div>
    <div class="frame-bar-v"></div>
    <div class="frame-bar-h"></div>
    <div class="frame-bevel"></div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span style="font-size:1.2rem">🌱</span>
      <h1 class="app-title">Мой подоконник</h1>
    </div>
    <span class="header-date" id="headerDate"></span>
  </header>

  <!-- Sky scene (clouds, sun, trees injected by JS) -->
  <div class="sky-scene" id="skyScene">
    <div class="sun"></div>
  </div>

  <!-- Empty-state hint -->
  <div class="empty-hint" id="emptyHint">
    <div class="empty-hint-arrow">👇</div>
    <p>Нажмите <strong>+</strong>, чтобы<br>посадить первый горшочек</p>
  </div>

  <!-- Windowsill -->
  <div class="windowsill-section">
    <div class="sill-lip"></div>
    <div class="sill-surface" id="sill"></div>
  </div>

</div><!-- /#mainView -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     DETAIL VIEW — Plant card
════════════════════════════════════════════════════════════════════════════ -->
<div id="detailView" class="view detail-view">

  <!-- Top navigation bar -->
  <div class="detail-topbar">
    <button class="back-btn" id="backBtn">
      <span class="back-arrow">←</span>
      Мой подоконник
    </button>
    <button class="delete-btn" id="deleteBtnTop">Удалить</button>
  </div>

  <!-- Hero: big pot + plant info -->
  <div class="detail-hero">
    <div class="hero-pot-area" id="heroPot"></div>
    <div class="hero-info">
      <span class="hero-variety-tag" id="heroVarietyTag"></span>
      <h2 class="hero-title" id="heroTitle"></h2>
      <p class="hero-meta" id="heroMeta"></p>
      <div class="hero-days" id="heroDays"></div>
    </div>
  </div>

  <!-- Scrollable detail body -->
  <div class="detail-body" id="detailBody">

    <div class="section-label">Этапы роста</div>
    <div class="stages-bar" id="stagesBar"></div>

    <div class="tip-card" id="tipCard"></div>

    <div class="section-label">Полив</div>
    <div class="water-widget" id="waterWidget"></div>

    <div class="section-label">Освещение</div>
    <div class="card" id="lightCard"></div>

    <!-- Cover section inserted here by JS if relevant -->
    <div id="coverSection"></div>

    <div class="section-label">Полив — подробнее</div>
    <div class="card" id="waterAdviceCard"></div>

    <div class="section-label">Сорт</div>
    <div class="card" id="varietyCard"></div>

    <!-- Advance stage / done banner -->
    <div id="actionArea"></div>

    <button class="btn-delete-plant" id="deleteBtnBottom">🗑 Удалить этот горшочек</button>

  </div>
</div><!-- /#detailView -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     ADD MODAL — Bottom sheet
════════════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="addModalOverlay">
  <div class="modal-sheet">

    <div class="modal-handle" aria-hidden="true"></div>

    <div class="modal-header">
      <h3 class="modal-title">Новый горшочек 🪴</h3>
      <button class="modal-close" id="modalCloseBtn" aria-label="Закрыть">✕</button>
    </div>

    <div class="modal-body">

      <!-- Step 1: choose plant type -->
      <div id="modalStep1">
        <div class="step-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
          <span class="step-text">Шаг 1 из 2 — Выберите культуру</span>
        </div>
        <div class="plant-type-grid" id="plantTypeGrid"></div>
      </div>

      <!-- Step 2: choose variety + date -->
      <div id="modalStep2" class="hidden">
        <button class="modal-back-btn" id="modalBackBtn">← Назад</button>
        <div class="step-indicator">
          <div class="step-dot done" style="background:var(--green-lt)"></div>
          <div class="step-dot active"></div>
          <span class="step-text" id="step2TypeName">Шаг 2 из 2</span>
        </div>

        <div class="variety-list" id="varietyList"></div>

        <div class="form-group">
          <label class="form-label" for="fDate">Дата посева</label>
          <input class="form-input" type="date" id="fDate">
        </div>

        <button class="btn-primary" id="confirmBtn" disabled>
          Посадить! 🌱
        </button>
      </div>

    </div><!-- /.modal-body -->
  </div><!-- /.modal-sheet -->
</div><!-- /#addModalOverlay -->


<script src="js/database.js"></script>
<script src="js/app.js"></script>
</body>
</html>
